version: "3"

# Repo-local tasks for HateSnake. `task check` on this repo fans out to
# `local:check`, which builds the container (which in turn runs the smoke
# tests inside the builder stage).

vars:
  IMAGE: hatesnake:dev
  CONTAINER_CMD:
    sh: command -v docker 2>/dev/null || command -v podman 2>/dev/null || true

tasks:
  check:
    desc: Build the container (automated tests run inside the builder stage)
    cmds:
      - task: docker:build

  build:
    desc: Build the HateSnake container image
    cmds:
      - task: docker:build

  docker:build:
    desc: Build the container. A successful build proves the smoke tests pass.
    cmds:
      - |
        if [ -z "{{.CONTAINER_CMD}}" ]; then
          echo "ERROR: neither docker nor podman is installed"
          exit 1
        fi
        {{.CONTAINER_CMD}} build -t {{.IMAGE}} .

  docker:test:
    desc: Run the smoke tests inside the runtime image
    cmds:
      - |
        if [ -z "{{.CONTAINER_CMD}}" ]; then
          echo "ERROR: neither docker nor podman is installed"
          exit 1
        fi
        {{.CONTAINER_CMD}} run --rm {{.IMAGE}} test

  docker:version:
    desc: Print the JDK version baked into the image
    cmds:
      - '{{.CONTAINER_CMD}} run --rm {{.IMAGE}} version'

  dev:
    desc: Compile and run the game locally (uses Temurin 17 --- Processing 3.3.6 is incompatible with newer JDKs)
    cmds:
      - export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk && export PATH=$JAVA_HOME/bin:$PATH && ./linux/compile.sh
      - export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk && export PATH=$JAVA_HOME/bin:$PATH && ./linux/run.sh

  dnf:
    desc: Install required packages (Temurin 17 JDK) via dnf
    cmds:
      - |
        if ! rpm -q temurin-17-jdk >/dev/null 2>&1; then
          if [ ! -f /etc/yum.repos.d/adoptium.repo ]; then
            sudo tee /etc/yum.repos.d/adoptium.repo > /dev/null <<'EOF'
        [Adoptium]
        name=Adoptium
        baseurl=https://packages.adoptium.net/artifactory/rpm/fedora/$releasever/$basearch
        enabled=1
        gpgcheck=1
        gpgkey=https://packages.adoptium.net/artifactory/api/gpg/key/public
        EOF
          fi
          sudo dnf install -y temurin-17-jdk
        else
          echo "OK: temurin-17-jdk already installed"
        fi
